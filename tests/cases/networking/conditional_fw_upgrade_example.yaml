name: Firmware Upgrade/Downgrade Test
description: Get firmware versions from S3, then manually write your test steps

variables:
  # Device configuration
  device_ip: "192.168.100.16"
  
  # S3 configuration
  bucket_name: "jpdsauto-senao"
  folder_prefix: "Access-Points/AN-810-AP-I-AC"

setup:
  # Get list of all firmware files from S3
  - action: "aws.list_files"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    file_extension: ".bin"
    download_dir: "Firmware"
    store_as: "firmware_list"
  
  # Get latest firmware
  - action: "aws.get_latest"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    file_extension: ".bin"
    download_dir: "Firmware"
    store_filename_as: "latest_firmware"
    store_version_as: "latest_version"
  
  # Get second-to-last firmware (older version for downgrade testing)
  - action: "aws.get_latest"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    file_extension: ".bin"
    download_dir: "Firmware"
    get_second_to_last: true
    store_filename_as: "older_firmware"
    store_version_as: "older_version"

steps:
  # Now you have these variables available:
  # - firmware_list: list of all firmware URLs
  # - latest_firmware: full S3 key of latest (e.g., "Access-Points/.../upgrade/file.bin")
  # - latest_firmware_basename: just filename (e.g., "an810i-v2.2.01.01.bin")
  # - latest_version: extracted version (e.g., "2.2.01.01")
  # - older_firmware: full S3 key of second-to-last
  # - older_firmware_basename: just filename
  # - older_version: extracted version
  
  # Write your own test steps here using these variables
  # Example:
  
  steps:
  # Login to device
  - action: browser.open
    url: "http://${device_ip}"
  
  - action: browser.fill
    field: "username"
    value: "${username}"
  
  - action: browser.fill
    field: "password"
    value: "${password}"
  
  - action: browser.click
    role: button
    name: "Login"
  
  # Your upgrade/downgrade steps here using:
  # Firmware/${latest_firmware_basename}
  # Firmware/${older_firmware_basename}

cleanup:
  # Example: Take screenshot after upgrade
  - action: browser.screenshot
    name: "after_upgrade"