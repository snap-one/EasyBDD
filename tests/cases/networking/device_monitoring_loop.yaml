name: "Device Monitoring Loop"
description: "Monitor device by calling get about repeatedly with other checks in between"
tags: ["jsonrpc", "monitoring", "loop"]

variables:
  server_url: "wss://firmware.testing.ovrc.com:10444"
  device_id: "14:3F:C3:91:09:F7"
  loop_count: 3

setup:
  - action: "JSONRPC connect"
    server_url: "${server_url}"
    device_id: "${device_id}"
    protocol: "firmware-protocol"
  
  - action: "JSONRPC start device updates"

steps:
  # First check - get device info
  - shared_step: "Get Device Info"
    store_as: "initial_info"
  
  - action: "Assert"
    expression: "'firmware' in initial_info"
    message: "Initial check should have firmware"
  
  # Check network settings
  - shared_step: "Get Network Settings"
    store_as: "network_config"
  
  # Second check - get device info again
  - shared_step: "Get Device Info"
    store_as: "second_check"
  
  - action: "Assert"
    expression: "'macAddress' in second_check"
    message: "Second check should have MAC address"
  
  # Run health check (which internally calls get about)
  - shared_step: "Device Health Check"
    device_name: "Test Device"
  
  # Third check - verify device still online
  - shared_step: "Verify Device Online"
  
  # Final check - get device info one more time
  - shared_step: "Get Device Info"
    store_as: "final_info"
  
  - action: "Assert"
    expression: "initial_info['deviceId'] == final_info['deviceId']"
    message: "Device ID should remain consistent"

cleanup:
  - action: "JSONRPC stop device updates"
  - action: "JSONRPC disconnect"
