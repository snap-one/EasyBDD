name: Simple Device Info Retrieval
description: Call dxGetAbout multiple times using shared step
tags:
- dxGetAbout
variables:
  server_url: wss://firmware.testing.ovrc.com:10444
  device_id: 14:3F:C3:91:09:F7
setup:
- JSONRPC connect:
    server_url: ${server_url}
    device_id: ${device_id}
    protocol: firmware-protocol
- JSONRPC start device updates: {}
steps:
- shared_step: {}
- JSONRPC get network settings:
    store_as: network
- shared_step: {}
- JSONRPC get time settings:
    store_as: time
- shared_step: {}
cleanup:
- JSONRPC stop device updates: {}
- JSONRPC disconnect: {}
