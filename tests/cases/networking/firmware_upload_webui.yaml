name: "Upload Firmware to Device via Web UI"
description: "Download firmware from S3 and upload to device through web interface"
tags: ["firmware", "upload", "web-ui", "s3"]

variables:
  # Device configuration
  device_ip: "192.168.1.100"
  device_url: "http://${device_ip}"
  
  # S3 configuration
  bucket_name: "jpdsauto-wattbox"
  folder_prefix: "upgrade/"
  firmware_pattern: "wattbox"

setup:
  # Step 1: Download firmware from S3 to local workspace
  - action: "aws.get_latest"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    filename_pattern: "${firmware_pattern}"
    file_extension: ".bin"
    download_dir: "Firmware"
    store_filename_as: "firmware_filename"
    store_version_as: "firmware_version"
  
  # The file is now at: Firmware/{firmware_filename}
  # Extract just the filename for the upload path
  - action: "Assert"
    expression: "firmware_filename is not None"
    message: "Should download firmware file"

steps:
  # Step 2: Open device web interface
  - action: "Open browser"
    url: "${device_url}"
    browser: "chromium"
    headless: false
  
  # Step 3: Navigate to firmware upload page
  - action: "Click"
    selector: "text=Firmware"
  
  - action: "Click"
    selector: "text=Update"
  
  # Step 4: Upload the firmware file
  # The file path will be: Firmware/upgrade_wattboxvps_2.2.1.0.bin
  - action: "Upload file"
    selector: "input[type='file']"
    file_path: "Firmware/${firmware_filename}"
  
  # Step 5: Click upload button
  - action: "Click"
    selector: "button:has-text('Upload')"
  
  # Step 6: Wait for upload to complete
  - action: "Wait"
    selector: "text=Upload successful"
    timeout: 120000  # 2 minutes for firmware upload
  
  # Step 7: Verify firmware version updated
  - action: "Click"
    selector: "text=About"
  
  - action: "Assert element text"
    selector: ".firmware-version"
    expected_text: "${firmware_version}"
    message: "Firmware version should be updated to ${firmware_version}"

teardown:
  - action: "Close browser"
