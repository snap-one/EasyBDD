name: Araknis Device API Test - Using Device Config
description: Test Araknis device using device configuration file
tags:
- api
- araknis
- device-config
variables:
  device_ip: 192.168.100.206
  api_base_url: http://${device_ip}/api/v1
  username: araknis
  password: SnapAV704
  full_log: true
steps:
- api.post:
    url: ${api_base_url}/auth/login
    body: '{"username": "${username}",

      "password": "${password}"}'
    store_as: token
    headers: ''
- api.get:
    url: ${api_base_url}/system/firmware-info
    device_id: araknis_206
- test.assert_response:
    response: last_response
    status_code: 200
    device_id: araknis_206
- api.get:
    url: ${api_base_url}/system/basic-info
    device_id: araknis_206
- test.assert_response:
    response: last_response
    status_code: 200
