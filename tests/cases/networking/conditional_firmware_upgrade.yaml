name: Conditional Firmware Upgrade
description: Only upgrade if current version is below target version

variables:
  device_ip: "192.168.100.16"
  bucket_name: "jpdsauto-senao"
  folder_prefix: "Access-Points/AN-810-AP-I-AC"
  target_version: "2.2.01.01"
  skip_upgrade: false

setup:
  # Get latest firmware from S3
  - action: "AWS get latest firmware"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    file_extension: ".bin"
    download_dir: "Firmware"
    store_filename_as: "firmware_s3_key"
    store_version_as: "firmware_version"
  
  # Open browser to device
  - action: Open browser
    url: "http://${device_ip}/cgi-bin/luci"
  
  # Login
  - action: Fill form field
    field: '#user'
    value: araknis
  - action: Fill form field
    field: '#pass'
    value: SnapAV704
  - action: Click element
    role: button
    name: Log In
  
  # Get current device firmware version using dxgetabout
  # This step would need to be customized based on how you get the version
  # Example approaches:
  # 1. Navigate to About page and extract version from text
  # 2. Make API call to get device info
  # 3. Use serial/SSH command
  
  # Example: Extract from About page
  - action: Click element
    role: link
    name: System
    description: "Navigate to System menu"
  
  - action: Click element
    role: link
    name: About
    description: "Open About page"
  
  # Store the version text (you'd need to implement "Get text" action)
  # For now, using Python to compare versions
  - action: Assert
    expression: "firmware_version is not None"
    description: "Verify we have S3 firmware version"

# Main test steps - these would be conditional based on version comparison
steps:
  # Version comparison logic using Python expression in Assert
  # If this fails, the test stops (effectively skipping upgrade)
  - action: Assert
    expression: "firmware_version >= target_version"
    description: "Check if upgrade needed (S3 version >= target)"
  
  # If we reach here, upgrade is needed
  - action: Click element
    role: link
    name: File Management
  
  - action: Wait
    timeout: 2000
  
  - action: Upload file
    selector: 'iframe >> #image'
    file_path: 'Firmware/${firmware_s3_key_basename}'
  
  - action: Wait
    timeout: 2000
  
  - action: Click element
    selector: 'iframe >> #UploadButton'
  
  - action: Wait
    timeout: 10000
  
  - action: Click element
    selector: 'iframe >> input[name="Button"]'
  
  - action: Wait
    timeout: 10000
    description: 'Wait for upgrade to start'

cleanup:
  - action: Take screenshot
    name: "firmware-upgrade-complete"
