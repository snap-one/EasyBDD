name: "Response Validation Example"
description: "Demonstrates HTTP response validation with Assert response action"
tags: ["assertions", "api", "validation"]

variables:
  api_endpoint: "https://jsonplaceholder.typicode.com"

steps:
  # Make an API request
  - action: API request
    method: GET
    url: "${api_endpoint}/users/1"
    store_response: "user_response"
  
  # Validate response with multiple expectations
  - action: Assert response
    response: "${user_response}"
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body_contains:
        - "Leanne Graham"
        - "email"
        - "address"
  
  # Get posts
  - action: API request
    method: GET
    url: "${api_endpoint}/posts"
    store_response: "posts_response"
  
  # Validate posts response
  - action: Assert response
    response: "${posts_response}"
    expect:
      status: 200
      headers:
        content-type: "application/json"
      max_response_time: 3000
  
  # Test POST request
  - action: API request
    method: POST
    url: "${api_endpoint}/posts"
    headers:
      Content-Type: "application/json"
    body:
      title: "Test Post"
      body: "This is a test"
      userId: 1
    store_response: "create_response"
  
  # Validate creation response
  - action: Assert response
    response: "${create_response}"
    expect:
      status: 201
      body_contains:
        - "id"
