name: Recorded Test
description: Test recorded using Easy BDD Interactive Recorder
tags:
- browser
- recorded
steps:
# Step 1: Open OvrC login page
- action: Open browser
  url: https://app.ovrc.com/#/login

# Step 2: Click email field
- action: Click element
  role: textbox
  name: Email
  description: 'Step 2: Click textbox: Email'

# Step 3: Fill email
- action: Fill form field
  role: textbox
  name: Email
  value: jpdsauto@gmail.com
  description: 'Step 3: Fill Email'

# Step 4: Click password field
- action: Click element
  role: textbox
  name: Password
  description: 'Step 4: Click textbox: Password'

# Step 5: Fill password
- action: Fill form field
  role: textbox
  name: Password
  value: Snapone704!
  description: 'Step 5: Fill Password'

# Step 6: Click Log In button
- action: Click element
  role: button
  name: Log In
  description: 'Step 6: Click button: Log In'

# Step 7: Click company name
- action: Click element
  text: 61Lab
  description: 'Step 7: Click text: 61Lab'

# Step 8: Click Devices tab
- action: Click element
  selector: '#devices__tab'
  description: 'Step 8: Click Devices tab'

# Step 9: Click device link
- action: Click element
  role: link
  name: WB-800-IPVM-6-jpdsauto
  description: 'Step 9: Click link: WB-800-IPVM-6-jpdsauto'

# Step 10: Click Configure link
- action: Click element
  role: link
  name: Configure
  description: 'Step 10: Click link: Configure'

# Step 11: Wait for page load
- action: wait
  time: 8
  description: 'Step 11: Wait for configuration page to fully load'

# Step 12: Click Configure Outlets link
- action: Click element
  role: link
  name: "Configure Outlets Set the"
  description: 'Step 12: Click Configure Outlets link'

# Step 13: Wait for outlet config page
- action: wait
  time: 5
  description: 'Step 13: Wait for outlet config page to fully load'

# Step 13a: Take screenshot of the form
- action: take screenshot
  name: outlet_config_form
  description: 'Step 13a: Screenshot of outlet config form'

# Step 15: Fill outlet name
- action: Fill form field
  field: input[name="1_name"]
  value: Modem
  description: 'Step 15: Fill outlet name: Modem'

# Step 16: Fill power on delay
- action: Fill form field
  field: input[name="1_powerOnDelay"]
  value: "30"
  description: 'Step 16: Fill power on delay'

# Step 17: Save configuration (Note: Dropdown selection skipped - see comment)
# Note: select[name="1_outletMethod"] exists but Playwright cannot locate it
# The select element is visible but not found by CSS, XPath, or any selector
# This appears to be a Playwright/page rendering timing issue
- action: Click element
  role: button
  name: Save
  description: 'Step 17: Save configuration'

# Step 18: Wait for save to complete
- action: wait
  time: 5
  description: 'Step 18: Wait for page load'
- action: Click element
  role: link
  name: "Configure Outlets Set the"
  description: 'Step 12: Click Configure Outlets link'

# Step 20: Fill power on delay again
- action: Fill form field
  field: input[name="1_powerOnDelay"]
  value: '30'
  description: 'Step 20: Fill: input[name="1_powerOnDelay"]'

# Step 21: Save again
- action: Click element
  role: button
  name: Save
  description: 'Step 21: Click button: Save'

# Step 22: Click Configure Outlets again
- action: Click element
  role: link
  name: Configure Outlets Set the
  description: 'Step 22: Click link: Configure Outlets Set the'

# Step 23: Click outlet name field
- action: Click element
  selector: input[name="1_name"]
  description: 'Step 23: Click: input[name="1_name"]'

# Step 24: Click outlet name field again
- action: Click element
  selector: input[name="1_name"]
  description: 'Step 24: Click: input[name="1_name"]'

# Step 25: Change outlet name to "Outlet 1"
- action: Fill form field
  field: input[name="1_name"]
  value: Outlet 1
  description: 'Step 25: Fill: Outlet 1'


# Step 27: Click power delay field
- action: Click element
  selector: input[name="1_powerOnDelay"]
  description: 'Step 27: Click: input[name="1_powerOnDelay"]'

# Step 28: Fill power delay with "1"
- action: Fill form field
  field: input[name="1_powerOnDelay"]
  value: '1'
  description: 'Step 28: Fill power delay: 1'

# Step 29: Save final configuration
- action: Click element
  role: button
  name: Save
  description: 'Step 29: Click button: Save'

