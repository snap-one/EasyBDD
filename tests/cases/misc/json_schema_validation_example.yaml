name: "JSON Schema Validation Example"
description: "Demonstrates JSON schema validation for API responses"
tags: ["assertions", "json-schema", "validation"]

variables:
  api_endpoint: "https://jsonplaceholder.typicode.com"

steps:
  # Get a user
  - action: API request
    method: GET
    url: "${api_endpoint}/users/1"
    store_response: "user_response"
  
  # Validate against JSON schema file
  - action: Assert JSON schema
    data: "${user_response.data}"
    schema_file: "tests/schemas/user.json"
  
  # Get another user
  - action: API request
    method: GET
    url: "${api_endpoint}/users/2"
    store_response: "user2_response"
  
  # Validate second user
  - action: Assert JSON schema
    data: "${user2_response.data}"
    schema_file: "tests/schemas/user.json"
  
  # Inline schema validation for a post
  - action: API request
    method: GET
    url: "${api_endpoint}/posts/1"
    store_response: "post_response"
  
  - action: Assert JSON schema
    data: "${post_response.data}"
    schema:
      type: "object"
      required: ["userId", "id", "title", "body"]
      properties:
        userId:
          type: "integer"
          minimum: 1
        id:
          type: "integer"
          minimum: 1
        title:
          type: "string"
          minLength: 1
        body:
          type: "string"
          minLength: 1
