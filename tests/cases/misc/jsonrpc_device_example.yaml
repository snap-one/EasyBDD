name: "JSON-RPC Device Test Example"
description: "Demonstrates JSON-RPC WebSocket communication for device management"
tags: ["jsonrpc", "websocket", "device", "example"]

variables:
  # WebSocket connection
  server_url: "ws://localhost:8080"
  device_id: "4B:00:00:00:00:15"
  
  # Datalake metrics
  product: "IoT Device"
  product_category: "Integration"
  time_savings: 20.0  # Manual device config takes 20 minutes

setup:
  # Connect to device via WebSocket
  - action: "JSONRPC connect"
    server_url: "${server_url}"
    device_id: "${device_id}"
    protocol: "firmware-protocol"
  
  # Start receiving device status updates
  - action: "JSONRPC start device updates"

steps:
  # Step 1: Get device information
  - action: "JSONRPC get about"
    store_as: "device_info"
  
  # Step 2: Verify device info
  - action: "Assert"
    expression: "device_info is not None"
    message: "Should receive device info"
  
  - action: "Assert"
    expression: "'firmware' in device_info"
    message: "Device info should include firmware version"
  
  # Step 3: Get network settings
  - action: "JSONRPC get network settings"
    store_as: "network_settings"
  
  # Step 4: Verify network settings
  - action: "Assert"
    expression: "'deviceName' in network_settings"
    message: "Network settings should include device name"
  
  - action: "Assert"
    expression: "'deviceIpAddress' in network_settings"
    message: "Network settings should include IP address"
  
  # Step 5: Get time settings
  - action: "JSONRPC get time settings"
    store_as: "time_settings"
  
  # Step 6: Verify time settings
  - action: "Assert"
    expression: "'name' in time_settings"
    message: "Time settings should include timezone name"
  
  # Step 7: Get status update frequency
  - action: "JSONRPC get status update frequency"
    store_as: "frequency"
  
  # Step 8: Verify frequency is numeric
  - action: "Assert"
    expression: "isinstance(frequency, (int, float))"
    message: "Frequency should be numeric"

cleanup:
  # Stop device updates
  - action: "JSONRPC stop device updates"
  
  # Disconnect from device (optional - happens automatically)
  - action: "JSONRPC disconnect"
