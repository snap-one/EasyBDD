name: "Simple Looped Time Tracking"
description: "Demonstrates time tracking with multiple iterations"
tags: ["demo", "time-tracking", "data-driven"]

variables:
  product: "Easy BDD Framework"
  product_category: "Demo"
  time_savings: 2.0  # 2 minutes per iteration
  base_url: "https://jsonplaceholder.typicode.com"

# Total time savings: 2 minutes × 3 iterations = 6 minutes
data:
  - post_id: 1
  - post_id: 2
  - post_id: 3

steps:
  - action: "Make API request"
    url: "${base_url}/posts/${post_id}"
    method: "GET"
  
  - action: "Make API request"
    url: "${base_url}/posts/${post_id}/comments"
    method: "GET"
