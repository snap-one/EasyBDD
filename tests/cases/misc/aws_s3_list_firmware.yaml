name: "AWS S3 - List Multiple Firmware Files"
description: "List and download multiple firmware files with filtering"
tags: ["aws", "s3", "firmware", "list"]

# CONFIGURATION REQUIRED:
# 1. Replace 'your-firmware-bucket' with your actual S3 bucket name
# 2. Update folder_prefix to match your S3 folder structure
# 3. Configure AWS credentials: aws configure

variables:
  # S3 Configuration
  bucket_name: "jpdsauto-wattbox"
  folder_prefix: ""
  
  # Filter for specific versions
  target_versions:
    - "1.00.48"
    - "1.00.54"

steps:
  # List all WattBox WiFi firmware files
  - action: "AWS list firmware files"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    filename_pattern: "wattboxvps"
    file_extension: ".bin"
    download_dir: "Firmware/WattBox"
    store_as: "all_firmware_urls"
  
  - action: "Print"
    message: "Found ${len(all_firmware_urls)} total firmware files"
  
  # List only specific versions
  - action: "AWS list firmware files"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    filename_pattern: "wattboxwifi"
    file_extension: ".bin"
    specific_version: "${target_versions}"
    download_dir: "Firmware/Specific"
    store_as: "specific_firmware_urls"
  
  - action: "Print"
    message: "Found ${len(specific_firmware_urls)} files matching target versions"
  
  # Validate results
  - action: "Assert"
    expression: "len(all_firmware_urls) > 0"
    message: "Should find at least one firmware file"
  
  - action: "Assert"
    expression: "len(specific_firmware_urls) >= 2"
    message: "Should find both target versions (1.00.48 and 1.00.54)"
  
  # Print all URLs
  - action: "Print"
    message: "All firmware URLs: ${all_firmware_urls}"
  
  - action: "Print"
    message: "Specific version URLs: ${specific_firmware_urls}"
