name: "AWS S3 - List All Files in Bucket"
description: "List all files without filters to see what's available"
tags: ["aws", "s3", "debug"]

variables:
  bucket_name: "jpdsauto-wattbox"
  folder_prefix: "upgrade"

steps:
  # List ALL files in the folder (no filters)
  - action: "AWS list firmware files"
    bucket_name: "${bucket_name}"
    folder_prefix: "${folder_prefix}"
    store_as: "all_files"
  
  # Check if we found anything
  - action: "Assert"
    expression: "all_files is not None"
    message: "Should get a response from S3"
  
  # Show count
  - action: "Assert"
    expression: "isinstance(all_files, list)"
    message: "Response should be a list"
