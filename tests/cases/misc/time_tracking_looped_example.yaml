name: "Time Tracking with Data Iterations"
description: "Demonstrates automatic time tracking with multiple data iterations"
tags: ["example", "time-tracking", "data-driven"]

variables:
  product: "Easy BDD Framework"
  product_category: "Demo"
  time_savings: 3.0  # 3 minutes saved per iteration
  base_url: "https://jsonplaceholder.typicode.com"

# Run test with 5 different user IDs
# Total time savings: 3 minutes × 5 iterations = 15 minutes
data:
  - user_id: 1
    expected_name: "Leanne Graham"
  - user_id: 2
    expected_name: "Ervin Howell"
  - user_id: 3
    expected_name: "Clementine Bauch"
  - user_id: 4
    expected_name: "Patricia Lebsack"
  - user_id: 5
    expected_name: "Chelsey Dietrich"

steps:
  # Fetch user data
  - action: "Make API request"
    url: "${base_url}/users/${user_id}"
    method: "GET"
    store_as: "user"
  
  # Verify user ID matches
  - action: "Assert"
    expression: "user['data']['id'] == user_id"
    message: "User ID should match request"
  
  # Verify user name
  - action: "Assert"
    expression: "user['data']['name'] == expected_name"
    message: "User name should match expected value"
  
  # Fetch user's posts
  - action: "Make API request"
    url: "${base_url}/posts?userId=${user_id}"
    method: "GET"
    store_as: "posts"
  
  # Verify posts returned
  - action: "Assert"
    expression: "user['status'] == 200 and len(posts.get('data', [])) > 0"
    message: "Should retrieve user's posts"
