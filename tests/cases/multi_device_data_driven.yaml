# Async Multi-Device Configuration Test
name: Async Multi-Device Configuration Test
description: Test device configuration across multiple endpoints using async data iteration
tags:
  - browser
  - playwright
  - device-config
  - async-driven

# Enable asynchronous execution
async_execution: true
max_workers: 3

variables:
  base_url: http://binary:SnapAV704@192.168.100.8
  page: "unit"

# Data array - each item represents one test iteration that will run concurrently
data:
  - endpoint_id: "1204"
    device_name: "RX-D46A9121077B"
    expected_model: "B-900-MOIP-4K-RX"
  
  - endpoint_id: "1012" 
    device_name: "RX-D46A9121E8C0"
    expected_model: "B-900-MOIP-4K-RX"
    
  - endpoint_id: "1156"
    device_name: "RX-D46A91272239" 
    expected_model: "B-960-MOIP-4K-RX"

steps:
  - action: Open browser
    url: ${base_url}/${page}/${endpoint_id}
    description: Open device configuration page
  
  - action: Take screenshot
    name: device_${endpoint_id}_async_loaded
    description: Capture device page after loading
  
  - action: Fill form field
    field: '[role="textbox"][name="Name"]'
    value: ${device_name}
    description: Enter device name
  
  - action: Wait for element
    selector: .btn.btn-outline:not([disabled])
    state: visible
    timeout: 10000
    description: Wait for button to become enabled
  
  - action: Click element
    selector: .btn.btn-outline
    description: Click the outline button
  
  - action: Take screenshot
    name: device_${endpoint_id}_async_configured
    description: Capture page after configuration
  
  - action: Verify text
    text: ${device_name}
    description: Verify device name appears on page


steps:
  - action: Open browser
    url: ${base_url}/${page}/${endpoint_id}
    description: Open device configuration page
  
  - action: Take screenshot
    name: device_${endpoint_id}_loaded
    description: Capture device page after loading
  
  - action: Fill form field
    field: '[role="textbox"][name="Name"]'
    value: ${device_name}
    description: Enter device name
  
  - action: Wait for element
    selector: .btn.btn-outline:not([disabled])
    state: visible
    timeout: 10000
    description: Wait for button to become enabled
  
  - action: Click element
    selector: .btn.btn-outline
    description: Click the outline button
  
  - action: Take screenshot
    name: device_${endpoint_id}_configured
    description: Capture page after configuration
  
  - action: Verify text
    text: ${device_name}
    description: Verify device name appears on page
    
  - action: Verify text
    text: ${expected_model}
    description: Verify device model is correct