name: OvrC - Select Device by IP
description: Login to OvrC and select specific device by IP address
tags:
- browser
- ovrc
- device-selection
browser:
  slow_mo: 3000  # Milliseconds delay between actions (3 seconds)
  timeout: 30
  headless: false
variables:
  base_url: "https://app.ovrc.com"
  email: "jpdsauto@gmail.com"
  password: "Snapone704!"
  ovrc_device: "WB-800-IPVM-6-jpdsauto"
steps:
# Execute login flow using shared step
- shared_step: "ovrc_login"
  parameters:
    email: "${email}"
    password: "${password}"
    base_url: "${base_url}"

# Select device by IP address
- action: Click element
  selector: 'a:has-text("${ovrc_device}")'
  description: Click device with name ${ovrc_device}

- action: Click element
  selector: 'a:has-text("Configure")'
  description: Click device with name ${ovrc_device}

- action: Wait for element
  selector: 'a:has-text("Configure Outlets")'
  timeout: 10
  description: Wait for Configure Outlets link to appear

- action: Click element
  selector: 'a:has-text("Configure Outlets")'
  description: Click Configure Outlets link

- action: wait
  time: 2
  description: Wait for page to load

- action: Fill form field
  field: "input[name='1_powerOnDelay']"
  value: "30"  # Your value here
  description: Set power on delay

- action: wait
  time: 1
  description: Brief pause before dropdown

- action: Select option
  selector: "select[name='1_outletMethod']"
  value: "Disabled"
  description: Set outlet method to disabled

- action: Fill form field
  field: "input[name='1_name']"
  value: "Modem"
  description: Enter outlet name

- action: Click element
  role: "button"
  name: "Save"

- action: wait
  time: 5
  description: Pause for 5 seconds