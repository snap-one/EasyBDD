name: OvrC Login Flow
description: Optimized login using name-based selectors
tags:
- browser
- login
- ovrc
variables:
  base_url: https://app.ovrc.com
  email: jpdsauto@gmail.com
  password: Snapone704! # pragma: allowlist secret
steps:
- Open browser:
    url: ${base_url}/#/login
- Fill form field:
    field: input[placeholder="Email"]
    value: ${email}
  description: Enter email by placeholder
- Fill form field:
    field: input[placeholder="Password"]
    value: ${password}
  description: Enter password by placeholder
- Click element:
    button: Log In
  description: Click login button
- Wait for element:
    selector: text="61"
    timeout: 10
- Click element:
    text: '61'
  description: Select organization
- Click element:
    selector: '#devices__tab'
  description: Go to devices tab
- browser.wait:
    timeout: '10'
