name: OvrC API Example Test
description: Example test demonstrating OvrC API WebSocket connection and device operations
tags:
- ovrc
- websocket
- example
variables:
  server_url: wss://firmware.testing.ovrc.com:10444
  device_mac: D4:6A:91:E5:B7:3B
steps:
- ovrc.connect:
    server_url: wss://firmware.testing.ovrc.com:10444
    device_id: D4:6A:91:E5:B7:3B
    protocol: firmware-protocol
    verify_ssl: true
  description: Connect to OvrC WebSocket server
- ovrc.start device updates:
    store_as: device_status
  description: Start monitoring device status updates
- ovrc.get about:
    store_as: device_info
  description: Retrieve device information (firmware, model, serial, etc.)
- Assert:
    expression: device_info is not None and 'firmware' in device_info
    message: Device information should contain firmware details
  description: Verify device information was retrieved
- ovrc.get network settings:
    store_as: network_settings
  description: Retrieve current network configuration
- Log:
    message: 'Network Settings: ${network_settings}'
  description: Display network settings
- ovrc.get time settings:
    store_as: time_settings
  description: Retrieve time zone and current time
- ovrc.stop device updates: {}
  description: Stop monitoring device updates
- ovrc.disconnect: {}
  description: Disconnect from OvrC WebSocket server
