name: Basic UI Test with Assertions
description: Test the functionality of a button and verify text on a web page
tags:
- UI
- assertions
variables:
  url: 192.168.100.16
steps:
- browser.open:
    url: http://${url}
- browser.click:
    selector: button#submit
- browser.assertText:
    selector: h1#title
    text: Welcome to the Page
