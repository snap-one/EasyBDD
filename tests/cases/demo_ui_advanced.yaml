name: "Demo UI Test - Advanced Interactions"
description: "Advanced UI test demonstrating form interactions, navigation, and assertions"
tags: ["demo", "ui", "browser", "advanced"]

variables:
  httpbin_url: "https://httpbin.org"

steps:
  - action: log
    message: "Starting advanced UI demo test"
  
  # Navigate to httpbin
  - action: browser.open
    url: "${httpbin_url}"
    description: "Open httpbin homepage"
  
  - action: wait
    time: 2
    description: "Wait for page load"
  
  # Test navigation and links
  - action: browser.click
    selector: "a[href='/get']"
    description: "Click on GET link"
  
  - action: wait
    time: 2
    description: "Wait for navigation"
  
  - action: test.assert_text_contains
    selector: "body"
    text: "get"
    description: "Verify we're on the GET endpoint page"
  
  - action: browser.take_screenshot
    name: "get_endpoint"
    description: "Capture GET endpoint page"
  
  # Navigate to forms
  - action: browser.open
    url: "${httpbin_url}/forms/post"
    description: "Navigate to form page"
  
  - action: wait
    time: 2
    description: "Wait for form to load"
  
  # Fill form fields
  - action: browser.fill
    field: "input[name='custname']"
    value: "Easy BDD Demo"
    description: "Fill customer name"
  
  - action: browser.fill
    field: "input[name='custtel']"
    value: "555-0100"
    description: "Fill phone number"
  
  - action: browser.fill
    field: "input[name='custemail']"
    value: "demo@easybdd.com"
    description: "Fill email address"
  
  - action: browser.fill
    field: "input[name='size']"
    value: "large"
    description: "Select size option"
  
  - action: browser.fill
    field: "textarea[name='comments']"
    value: "This is a demo test created by Easy BDD framework"
    description: "Fill comments field"
  
  - action: browser.take_screenshot
    name: "form_before_submit"
    description: "Capture form before submission"
  
  # Submit form
  - action: browser.click
    selector: "input[type='submit']"
    description: "Submit the form"
  
  - action: wait
    time: 3
    description: "Wait for form submission"
  
  # Verify submission
  - action: test.assert_text_contains
    selector: "body"
    text: "Easy BDD Demo"
    description: "Verify form data was submitted correctly"
  
  - action: test.assert_text_contains
    selector: "body"
    text: "demo@easybdd.com"
    description: "Verify email was submitted"
  
  - action: browser.take_screenshot
    name: "form_after_submit"
    description: "Capture form submission result"
  
  # Test browser back navigation
  - action: browser.go_back
    description: "Navigate back to previous page"
  
  - action: wait
    time: 2
    description: "Wait for navigation"
  
  - action: log
    message: "Advanced UI demo test completed successfully"

