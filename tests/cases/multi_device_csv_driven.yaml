# Method 2: CSV Data Source
name: Device Configuration from CSV
description: Load device test data from external CSV file
tags:
  - browser
  - playwright  
  - device-config
  - csv-driven

variables:
  base_url: http://binary:SnapAV704@192.168.100.8
  page: "unit"

# Load data from CSV file
data_source:
  type: "csv"
  file: "tests/data/devices.csv"
  # CSV should have columns: endpoint_id,device_name,expected_model

steps:
  - action: Open browser
    url: ${base_url}/${page}/${endpoint_id}
  
  - action: Fill form field
    field: '[role="textbox"][name="Name"]'
    value: ${device_name}
  
  - action: Wait for element
    selector: .btn.btn-outline:not([disabled])
    state: visible
    timeout: 10000
  
  - action: Click element
    selector: .btn.btn-outline
  
  - action: Verify text
    text: ${device_name}
  
  - action: Verify text
    text: ${expected_model}