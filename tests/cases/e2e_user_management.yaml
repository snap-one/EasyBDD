name: "E2E User Management Test"
description: "Complete user management workflow using multiple shared steps"
tags: ["e2e", "user-management", "api", "browser"]

variables:
  api_url: "https://api.example.com"
  base_url: "https://app.example.com"
  client_id: "test-client"
  client_secret: "test-secret"
  user_name: "Test User"
  user_email: "testuser@example.com"
  admin_username: "admin@example.com"
  admin_password: "AdminPass123"

setup:
  # Get API authentication token
  - shared_step: "api_authentication"
    parameters:
      api_url: "${api_url}"
      client_id: "${client_id}"
      client_secret: "${client_secret}"

steps:
  # Create user via API first
  - shared_step: "create_user_api"
    parameters:
      api_url: "${api_url}"
      auth_token: "${auth_token}"
      user_name: "${user_name}"
      user_email: "${user_email}"
  
  # Setup browser for UI verification
  - shared_step: "browser_setup"
    parameters:
      base_url: "${base_url}"
  
  # Login as admin to verify user creation
  - shared_step: "login_sequence"
    parameters:
      username: "${admin_username}"
      password: "${admin_password}"
      base_url: "${base_url}"
  
  # Navigate to user management
  - action: "Click element"
    selector: "a[href='/admin/users']"
  
  # Verify user appears in the list
  - action: "Verify page contains"
    text: "${user_email}"
  
  # Click on the created user
  - action: "Click element"
    text: "${user_email}"
  
  # Verify user details
  - action: "Verify page contains"
    text: "${user_name}"
  
  - action: "Take screenshot"
    name: "user_details_verification"

cleanup:
  - shared_step: "cleanup_browser"