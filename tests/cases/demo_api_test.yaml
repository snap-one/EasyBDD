name: "Demo API Test - Public API"
description: "Simple API test demonstrating REST API testing with public endpoints"
tags: ["demo", "api", "rest", "public"]

variables:
  jsonplaceholder_url: "https://jsonplaceholder.typicode.com"
  httpbin_url: "https://httpbin.org"

steps:
  - action: log
    message: "Starting API demo test"
  
  # Test GET request - Get user data
  - action: API request
    method: GET
    url: "${jsonplaceholder_url}/users/1"
    store_response: "user_response"
    description: "Get user data from JSONPlaceholder API"
  
  - action: Assert response
    response: "${user_response}"
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body_contains:
        - "name"
        - "email"
    description: "Verify GET request succeeded"
  
  - action: log
    message: "User data retrieved successfully"
  
  # Test GET request - Get posts
  - action: API request
    method: GET
    url: "${jsonplaceholder_url}/posts"
    params:
      _limit: 5
    store_response: "posts_response"
    description: "Get posts with limit parameter"
  
  - action: Assert response
    response: "${posts_response}"
    expect:
      status: 200
    description: "Verify posts request succeeded"
  
  # Test POST request - Create new post
  - action: API request
    method: POST
    url: "${jsonplaceholder_url}/posts"
    headers:
      Content-Type: "application/json"
    body:
      title: "Demo Test Post"
      body: "This is a test post created by Easy BDD framework"
      userId: 1
    store_response: "post_response"
    description: "Create a new post"
  
  - action: Assert response
    response: "${post_response}"
    expect:
      status: 201
      body_contains:
        - "id"
    description: "Verify POST request succeeded"
  
  - action: log
    message: "Post created successfully"
  
  # Test PUT request - Update post
  - action: API request
    method: PUT
    url: "${jsonplaceholder_url}/posts/1"
    headers:
      Content-Type: "application/json"
    body:
      id: 1
      title: "Updated Demo Post"
      body: "This post has been updated by Easy BDD"
      userId: 1
    store_response: "updated_post"
    description: "Update existing post"
  
  - action: Assert response
    response: "${updated_post}"
    expect:
      status: 200
    description: "Verify PUT request succeeded"
  
  # Test DELETE request
  - action: API request
    method: DELETE
    url: "${jsonplaceholder_url}/posts/1"
    store_response: "delete_response"
    description: "Delete a post"
  
  - action: Assert response
    response: "${delete_response}"
    expect:
      status: 200
    description: "Verify DELETE request succeeded"
  
  # Test httpbin.org endpoints
  - action: API request
    method: GET
    url: "${httpbin_url}/get"
    params:
      test_param: "demo_value"
      framework: "easy_bdd"
    store_response: "httpbin_get"
    description: "Test httpbin GET endpoint"
  
  - action: Assert response
    response: "${httpbin_get}"
    expect:
      status: 200
    description: "Verify httpbin GET succeeded"
  
  - action: log
    message: "API demo test completed successfully"

