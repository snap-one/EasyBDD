name: Device Configuration Test
description: Auto-generated from Playwright recording - Configure device with name RX-D46A9121077B
tags:
  - browser
  - recorded
  - playwright
  - device-config

variables:
  base_url: http://binary:SnapAV704@192.168.100.8
  page: "unit"
  endpoint_id: "1204"
  device_name: "RX-D46A9121077B"

steps:
  - action: Open browser
    url: ${base_url}/${page}/${endpoint_id}
  
  - action: Take screenshot
    name: main_page_loaded
    description: Capture main page after loading
  
  - action: Fill form field
    field: '[role="textbox"][name="Name"]'
    value: ${device_name}
    description: Enter device name
  
  - action: Wait for element
    selector: .btn.btn-outline:not([disabled])
    state: visible
    timeout: 10000
    description: Wait for button to become enabled
  
  - action: Click element
    selector: .btn.btn-outline
    description: Click the outline button (first one)

  - action: Take screenshot
    name: after_button_click
    description: Capture page after button click

  - action: Refresh browser
    description: Refresh to see changes
  
  - action: Verify text
    text: ${device_name}
    description: Verify device name appears on page