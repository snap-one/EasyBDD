name: "Simple Login Test"
description: "Test user login with valid credentials"
tags: ["browser", "login"]

variables:
  username: "testuser@example.com"
  password: "SecurePass123"
  base_url: "https://app.example.com"

steps:
  - action: "Open browser"
    url: "${base_url}/login"
    
  - action: "Fill form field"
    field: "email"
    value: "${username}"
    
  - action: "Fill form field"
    field: "password"
    value: "${password}"
    
  - action: "Click button"
    button: "Sign In"
    
  - action: "Verify page contains"
    text: "Welcome"