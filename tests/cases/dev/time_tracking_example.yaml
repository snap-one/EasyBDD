name: "Time Tracking Example"
description: "Demonstrates automatic time tracking and datalake posting"
tags: ["example", "time-tracking", "datalake"]

variables:
  # Datalake metrics (optional - defaults will be used if not provided)
  product: "Easy BDD Framework"
  product_category: "Demo"
  mac_address: "00:11:22:33:44:55"
  time_savings: 8.0  # This test saves 8 minutes vs manual testing
  
  # Test-specific variables
  base_url: "https://jsonplaceholder.typicode.com"

steps:
  # Step 1: Make an API request
  - action: "Make API request"
    url: "${base_url}/posts/1"
    method: "GET"
    store_as: "post_response"
  
  # Step 2: Verify response status
  - action: "Assert"
    expression: "post_response['status'] == 200"
    message: "API request should return 200"
  
  # Step 3: Verify post has expected structure
  - action: "Assert"
    expression: "'data' in post_response and 'id' in post_response['data']"
    message: "Response should have data with id field"
  
  # Step 4: Another API request
  - action: "Make API request"
    url: "${base_url}/users/1"
    method: "GET"
    store_as: "user_response"
  
  # Step 5: Verify user response
  - action: "Assert"
    expression: "user_response['data']['id'] == 1"
    message: "User ID should be 1"
