name: Extract Device Name
description: Log into the web UI and extract the device name
tags:
- UI
- login
- extraction
variables:
  url: http://192.168.100.16
  username: araknis
  password: SnapAV704
steps:
- browser.open:
    url: ${url}
- browser.fill:
    selector: input#username
    value: ${username}
- browser.fill:
    selector: input#password
    value: ${password}
- browser.click:
    selector: button#login
- browser.extract:
    selector: span#deviceName
    variable: device_name
