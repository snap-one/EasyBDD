# Comprehensive Web UI Testing Configuration
# This file extends the base web_app_config.yaml with additional testing-specific settings

name: "Comprehensive Web UI Test Configuration"
description: "Extended configuration for comprehensive web application testing"
extends: "web_app_config"  # Inherits from base config

# Test Environment Management
environments:
  development:
    base_url: "http://localhost:3000"
    api_url: "http://localhost:3001/api"
    debug: true
    slow_mo: 100  # Slow down actions for debugging
    screenshots_on_failure: true
    video_recording: false
    
  staging:
    base_url: "https://staging.mywebapp.com"
    api_url: "https://staging-api.mywebapp.com/api"
    debug: false
    slow_mo: 0
    screenshots_on_failure: true
    video_recording: true
    
  production:
    base_url: "https://mywebapp.com"
    api_url: "https://api.mywebapp.com/api"
    debug: false
    slow_mo: 0
    screenshots_on_failure: true
    video_recording: false
    read_only: true  # Prevents destructive actions

# Browser Configuration Matrix
browser_matrix:
  chrome_desktop:
    browser: "chrome"
    viewport: { width: 1920, height: 1080 }
    options:
      - "--disable-web-security"
      - "--disable-dev-shm-usage"
      - "--no-sandbox"
    extensions:
      - "accessibility-checker"
      
  firefox_desktop:
    browser: "firefox"
    viewport: { width: 1920, height: 1080 }
    options:
      - "--disable-dev-shm-usage"
      
  safari_desktop:
    browser: "webkit"
    viewport: { width: 1920, height: 1080 }
    
  chrome_mobile:
    browser: "chrome"
    viewport: { width: 375, height: 667 }
    user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X)"
    touch_enabled: true
    
  firefox_tablet:
    browser: "firefox"
    viewport: { width: 768, height: 1024 }
    user_agent: "Mozilla/5.0 (iPad; CPU OS 15_0 like Mac OS X)"
    touch_enabled: true

