name: "Web UI Test Utilities"
description: "Reusable utility actions and common test patterns"
web_app: "web_app_config"
tags: ["utilities", "helpers", "common"]

# Global utility variables
variables:
  screenshot_path: "reports/screenshots"
  test_data_path: "tests/data"
  timeout_short: 5000
  timeout_medium: 10000
  timeout_long: 30000

# Reusable action definitions
action_definitions:
  # Authentication utilities
  quick_login:
    description: "Fast login for test setup"
    parameters:
      - name: username
        default: "${test_user.username}"
      - name: password
        default: "${test_user.password}"
    steps:
      - action: navigate_to
        url: "${base_url}/login"
      - action: fill_field
        element: "input[name='username']"
        value: "${username}"
      - action: fill_field
        element: "input[name='password']"
        value: "${password}"
      - action: click_element
        element: "button[type='submit']"
      - action: wait_for_element
        element: ".dashboard, .user-menu"
        timeout: "${timeout_medium}"
        
  logout_safely:
    description: "Safe logout with error handling"
    steps:
      - action: click_element
        element: ".user-menu"
        ignore_if_missing: true
      - action: click_element
        element: "a[href*='logout'], .logout-btn"
        ignore_if_missing: true
      - action: wait_for_element
        element: ".login-form, body[data-page='login']"
        timeout: "${timeout_short}"
        ignore_timeout: true
        
  # Data management utilities
  clear_cart:
    description: "Remove all items from shopping cart"
    steps:
      - action: navigate_to
        url: "${base_url}/cart"
      - action: repeat_while_exists
        element: ".cart-item .remove-btn"
        max_iterations: 20
        actions:
          - action: click_element
            element: ".cart-item .remove-btn:first"
          - action: wait_for_element_gone
            element: ".removing"
            timeout: "${timeout_short}"
            
  add_test_product_to_cart:
    description: "Add a specific test product to cart"
    parameters:
      - name: product_name
        default: "Test Product"
      - name: quantity
        default: 1
    steps:
      - action: navigate_to
        url: "${base_url}/products"
      - action: fill_field
        element: "input[name='search']"
        value: "${product_name}"
      - action: click_element
        element: ".search-btn"
      - action: wait_for_element
        element: ".product-card"
      - action: click_element
        element: ".product-card:first-child .add-to-cart"
      - action: verify_notification
        text: "Added to cart"
        
  # Form utilities
  fill_checkout_form:
    description: "Fill standard checkout form"
    parameters:
      - name: customer_data
        default: "${test_customer}"
    steps:
      - action: fill_field
        element: "input[name='first_name']"
        value: "${customer_data.first_name}"
      - action: fill_field
        element: "input[name='last_name']"
        value: "${customer_data.last_name}"
      - action: fill_field
        element: "input[name='email']"
        value: "${customer_data.email}"
      - action: fill_field
        element: "input[name='address']"
        value: "${customer_data.address}"
      - action: fill_field
        element: "input[name='city']"
        value: "${customer_data.city}"
      - action: select_option
        element: "select[name='state']"
        value: "${customer_data.state}"
      - action: fill_field
        element: "input[name='zip']"
        value: "${customer_data.zip}"
        
  # Verification utilities
  verify_page_loaded:
    description: "Comprehensive page load verification"
    parameters:
      - name: page_identifier
        required: true
    steps:
      - action: wait_for_element
        element: "${page_identifier}"
        timeout: "${timeout_medium}"
      - action: verify_no_error_messages
      - action: verify_page_title_not_empty
      - action: verify_main_content_visible
        
  capture_full_page_evidence:
    description: "Capture comprehensive evidence for test reporting"
    parameters:
      - name: test_step
        required: true
    steps:
      - action: take_screenshot
        filename: "${screenshot_path}/${test_step}_${timestamp}.png"
      - action: capture_network_activity
        filename: "${screenshot_path}/${test_step}_network_${timestamp}.har"
      - action: capture_console_logs
        filename: "${screenshot_path}/${test_step}_console_${timestamp}.json"
        
  # Error handling utilities
  handle_modal_if_present:
    description: "Dismiss modal dialogs if they appear"
    steps:
      - action: wait_for_element
        element: ".modal, .dialog, .popup"
        timeout: 2000
        ignore_timeout: true
      - action: click_element
        element: ".modal .close-btn, .dialog .dismiss, .popup .ok"
        ignore_if_missing: true
      - action: press_key
        key: "Escape"
        ignore_errors: true
        
  retry_on_failure:
    description: "Retry a set of actions if they fail"
    parameters:
      - name: actions
        required: true
      - name: max_retries
        default: 3
    steps:
      - action: attempt_with_retries
        retries: "${max_retries}"
        actions: "${actions}"
        delay_between_retries: 2000
        
