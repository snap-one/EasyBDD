# Browser configuration presets
browser_presets:
  desktop_chrome:
    browser: "chrome"
    viewport:
      width: 1920
      height: 1080
    options:
      - "--disable-web-security"
      - "--disable-features=TranslateUI"
      
  mobile_safari:
    browser: "webkit"
    viewport:
      width: 375
      height: 667
    user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X)"
    
  tablet_android:
    browser: "chrome"
    viewport:
      width: 768
      height: 1024
    user_agent: "Mozilla/5.0 (Linux; Android 10; Tablet)"
    
# Common verification patterns
verification_patterns:
  successful_form_submission:
    - action: verify_url_contains
      text: "success"
    - action: verify_element_visible
      element: ".success-message, .confirmation"
    - action: verify_no_error_messages
    
  failed_form_submission:
    - action: verify_element_visible
      element: ".error-message, .field-error"
    - action: verify_url_unchanged
    - action: verify_form_still_visible
    
  page_accessibility_check:
    - action: verify_page_title_exists
    - action: verify_heading_structure
    - action: verify_all_images_have_alt
    - action: verify_form_labels_present
    
# Performance testing patterns
performance_patterns:
  basic_performance_check:
    - action: measure_page_load_time
    - action: verify_load_time_under
      threshold: 3000
    - action: measure_first_contentful_paint
    - action: verify_fcp_under
      threshold: 1500
      
  comprehensive_performance_audit:
    - action: measure_core_web_vitals
    - action: audit_accessibility
    - action: audit_best_practices
    - action: audit_seo
    - action: generate_performance_report