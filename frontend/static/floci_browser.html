<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy BDD · Floci Browser</title>
<style>
:root {
  --bg: #0f1419;
  --bg-panel: #161c24;
  --bg-card: #1c242e;
  --bg-input: #12181f;
  --bg-hover: #232d3a;
  --border: #2a3542;
  --border-focus: #3d7eff;
  --text: #dbe4ee;
  --text-dim: #8a99ab;
  --text-faint: #5c6a7a;
  --accent: #3d7eff;
  --accent-hover: #5a92ff;
  --green: #2ecc71;
  --red: #e74c5c;
  --amber: #f0a832;
  --purple: #a06bff;
  --mono: "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font: 14px/1.45 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); overflow: hidden;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input {
  font: inherit; color: var(--text); background: var(--bg-input);
  border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px;
}
input:focus { outline: none; border-color: var(--border-focus); }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: #2c3947; border-radius: 5px; }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- layout ---------- */
#app { display: flex; flex-direction: column; height: 100vh; }
#topbar {
  display: flex; align-items: center; gap: 14px; padding: 0 16px; height: 52px;
  background: var(--bg-panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#topbar .logo { font-weight: 700; font-size: 15px; white-space: nowrap; }
#topbar .logo span { color: var(--accent); }
#endpoint { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }
#conn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); margin-left: auto; }
#conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); }
#conn.ok .dot { background: var(--green); }
#conn.err .dot { background: var(--red); }
#main { display: flex; flex: 1; min-height: 0; }

/* ---------- sidebar ---------- */
#sidebar {
  width: 250px; flex-shrink: 0; background: var(--bg-panel);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0;
}
#sidebar .head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 12px 8px;
}
#sidebar .head h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); }
#bucket-list { flex: 1; overflow-y: auto; padding: 2px 8px 20px; }
.bucket-item {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  padding: 6px 8px; border-radius: 6px; color: var(--text-dim); font-size: 13px;
}
.bucket-item:hover { background: var(--bg-hover); color: var(--text); }
.bucket-item.active { background: rgba(61,126,255,.15); color: var(--text); }
.bucket-item .icon { flex-shrink: 0; }
.empty-note { padding: 10px 12px; font-size: 12.5px; color: var(--text-faint); }

/* ---------- content ---------- */
#content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
#crumbbar {
  display: flex; align-items: center; gap: 10px; padding: 12px 20px 10px;
  border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-wrap: wrap;
}
#breadcrumb { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-size: 13.5px; min-width: 0; }
#breadcrumb .crumb { color: var(--accent); padding: 2px 4px; border-radius: 4px; }
#breadcrumb .crumb:hover { background: var(--bg-hover); color: var(--accent-hover); }
#breadcrumb .crumb.current { color: var(--text); cursor: default; font-weight: 600; }
#breadcrumb .crumb.current:hover { background: none; }
#breadcrumb .sep { color: var(--text-faint); }
#toolbar { display: flex; align-items: center; gap: 8px; margin-left: auto; }
#filter-input { width: 220px; font-size: 13px; }
.btn {
  padding: 6px 13px; border-radius: 6px; border: 1px solid var(--border);
  font-size: 13px; color: var(--text-dim); white-space: nowrap;
}
.btn:hover { border-color: var(--text-faint); color: var(--text); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn.danger { color: var(--red); border-color: rgba(231,76,92,.4); }
.btn.danger:hover { background: rgba(231,76,92,.12); border-color: var(--red); }
.btn:disabled { opacity: .5; cursor: default; }

#listing { flex: 1; overflow-y: auto; padding: 0 20px 60px; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th {
  position: sticky; top: 0; background: var(--bg); z-index: 1;
  text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
  color: var(--text-faint); font-weight: 600; padding: 12px 10px 8px;
  border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;
}
thead th:hover { color: var(--text-dim); }
thead th.no-sort { cursor: default; }
thead th .arrow { font-size: 10px; margin-left: 3px; }
tbody td { padding: 7px 10px; border-bottom: 1px solid rgba(42,53,66,.5); vertical-align: middle; }
tbody tr:hover { background: var(--bg-hover); }
td.name { max-width: 0; width: 55%; }
td.name .row-link {
  display: flex; align-items: center; gap: 8px; color: var(--text); max-width: 100%;
  text-align: left; width: 100%;
}
td.name .row-link .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.name .row-link:hover .label { color: var(--accent-hover); text-decoration: underline; }
td.size, td.modified { color: var(--text-dim); font-family: var(--mono); font-size: 12.5px; white-space: nowrap; }
td.actions { text-align: right; white-space: nowrap; }
.icon-btn { color: var(--text-faint); padding: 4px 7px; border-radius: 5px; font-size: 13px; }
.icon-btn:hover { color: var(--text); background: var(--bg-hover); }
.icon-btn.danger:hover { color: var(--red); background: rgba(231,76,92,.12); }
#load-more-row { text-align: center; padding: 14px; }
#status-note { padding: 30px 10px; text-align: center; color: var(--text-faint); font-size: 13px; }
#count-note { padding: 10px; font-size: 12px; color: var(--text-faint); }

/* ---------- modal ---------- */
.overlay {
  position: fixed; inset: 0; background: rgba(8,12,17,.7); display: none;
  align-items: center; justify-content: center; z-index: 50;
}
.overlay.open { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  width: min(760px, calc(100vw - 40px)); max-height: calc(100vh - 80px);
  display: flex; flex-direction: column; overflow: hidden;
}
.modal .m-head {
  display: flex; align-items: center; gap: 10px; padding: 13px 16px;
  border-bottom: 1px solid var(--border);
}
.modal .m-head h3 {
  font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; font-family: var(--mono); flex: 1; min-width: 0;
}
.modal .m-body { padding: 16px; overflow-y: auto; min-height: 0; }
.modal .m-foot {
  display: flex; justify-content: flex-end; gap: 8px; padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.meta-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 14px; font-size: 13px; margin-bottom: 14px; }
.meta-grid .k { color: var(--text-faint); }
.meta-grid .v { font-family: var(--mono); font-size: 12.5px; word-break: break-all; }
.meta-grid .v a { color: var(--accent); }
#preview-box { border: 1px solid var(--border); border-radius: 8px; background: var(--bg-input); overflow: auto; max-height: 45vh; }
#preview-box pre {
  padding: 12px; font-family: var(--mono); font-size: 12px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}
#preview-box img { display: block; max-width: 100%; margin: 0 auto; }
#preview-box .no-preview { padding: 24px; text-align: center; color: var(--text-faint); font-size: 13px; }
#confirm-text { font-size: 13.5px; color: var(--text-dim); }
#confirm-text b { color: var(--text); font-family: var(--mono); font-size: 12.5px; word-break: break-all; }

/* ---------- toast ---------- */
#toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 16px; font-size: 13px; display: none; z-index: 100; max-width: 80vw;
}
#toast.show { display: block; }
#toast.err { border-color: var(--red); color: #f08090; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">Easy BDD · <span>Floci Browser</span></div>
    <div id="endpoint"></div>
    <div id="conn"><span class="dot"></span><span id="conn-label">connecting…</span></div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="head">
        <h2>Buckets</h2>
        <button class="icon-btn" id="refresh-buckets" title="Refresh buckets">↻</button>
      </div>
      <div id="bucket-list"></div>
    </div>
    <div id="content">
      <div id="crumbbar">
        <div id="breadcrumb"></div>
        <div id="toolbar">
          <input id="filter-input" type="text" placeholder="Filter current folder…">
          <button class="btn" id="refresh-listing" title="Refresh listing">↻ Refresh</button>
          <button class="btn primary" id="upload-btn">⬆ Upload</button>
          <input type="file" id="file-input" multiple style="display:none">
        </div>
      </div>
      <div id="listing"></div>
    </div>
  </div>
</div>

<!-- object preview modal -->
<div class="overlay" id="preview-overlay">
  <div class="modal">
    <div class="m-head">
      <h3 id="preview-title"></h3>
      <button class="icon-btn" data-close="preview-overlay">✕</button>
    </div>
    <div class="m-body">
      <div class="meta-grid" id="preview-meta"></div>
      <div id="preview-box"></div>
    </div>
    <div class="m-foot">
      <button class="btn danger" id="preview-delete">Delete</button>
      <button class="btn primary" id="preview-download">Download</button>
    </div>
  </div>
</div>

<!-- delete confirmation modal -->
<div class="overlay" id="confirm-overlay">
  <div class="modal" style="width:min(520px,calc(100vw - 40px))">
    <div class="m-head"><h3 style="font-family:inherit">Confirm delete</h3>
      <button class="icon-btn" data-close="confirm-overlay">✕</button>
    </div>
    <div class="m-body"><p id="confirm-text"></p></div>
    <div class="m-foot">
      <button class="btn" data-close="confirm-overlay">Cancel</button>
      <button class="btn danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";

const state = {
  buckets: [],
  bucket: null,
  prefix: "",
  folders: [],
  objects: [],
  nextToken: null,
  loading: false,
  sort: { col: "name", dir: 1 },
  filter: "",
  previewKey: null,
  pendingDelete: null, // {type: "object"|"folder", key/prefix}
};

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const qs = (params) => new URLSearchParams(params).toString();

const TEXT_EXT = new Set(["txt","log","json","yaml","yml","md","csv","tsv","py","sh","bash","cfg","ini","xml","html","htm","css","js","ts","robot","feature","conf","toml","properties","env","sql","bat","ps1"]);
const IMG_EXT = new Set(["png","jpg","jpeg","gif","svg","webp","ico","bmp"]);
// extensionless files that are always text (matched on basename, incl. "Jenkinsfile.easybdd")
const TEXT_BASENAMES = ["jenkinsfile","dockerfile","makefile","readme","license","changelog"];
const PREVIEW_TEXT_LIMIT = 2 * 1024 * 1024; // don't inline-preview text files over 2 MB

function ext(name) {
  const i = name.lastIndexOf(".");
  return i < 0 ? "" : name.slice(i + 1).toLowerCase();
}

function fmtSize(n) {
  if (n === null || n === undefined) return "—";
  if (n < 1024) return n + " B";
  const units = ["KB", "MB", "GB", "TB"];
  let v = n;
  for (const u of units) {
    v /= 1024;
    if (v < 1024) return v.toFixed(v < 10 ? 1 : 0) + " " + u;
  }
  return v.toFixed(0) + " PB";
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const p = (x) => String(x).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

let toastTimer = null;
function toast(msg, isErr) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ""; }, isErr ? 6000 : 3000);
}

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) {
    let detail = r.statusText;
    try { detail = (await r.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return r.json();
}

// ---------- status / buckets ----------

async function loadStatus() {
  const conn = $("conn");
  try {
    const s = await api("/api/status");
    $("endpoint").textContent = s.endpoint || "";
    if (s.ok) {
      conn.className = "ok";
      $("conn-label").textContent = "connected";
    } else {
      conn.className = "err";
      $("conn-label").textContent = "unreachable";
      toast("Floci endpoint unreachable: " + (s.error || ""), true);
    }
  } catch (e) {
    conn.className = "err";
    $("conn-label").textContent = "error";
  }
}

async function loadBuckets() {
  try {
    state.buckets = await api("/api/buckets");
  } catch (e) {
    state.buckets = [];
    toast("Failed to list buckets: " + e.message, true);
  }
  renderBuckets();
}

function renderBuckets() {
  const box = $("bucket-list");
  if (!state.buckets.length) {
    box.innerHTML = '<div class="empty-note">No buckets found.</div>';
    return;
  }
  box.innerHTML = state.buckets.map((b) => `
    <button class="bucket-item${b.name === state.bucket ? " active" : ""}" data-bucket="${esc(b.name)}" title="${esc(b.name)}${b.creation_date ? "\ncreated " + fmtDate(b.creation_date) : ""}">
      <span class="icon">🪣</span><span style="overflow:hidden;text-overflow:ellipsis">${esc(b.name)}</span>
    </button>`).join("");
  box.querySelectorAll(".bucket-item").forEach((el) =>
    el.addEventListener("click", () => openLocation(el.dataset.bucket, "")));
}

// ---------- listing ----------

async function openLocation(bucket, prefix) {
  state.bucket = bucket;
  state.prefix = prefix;
  state.folders = [];
  state.objects = [];
  state.nextToken = null;
  state.filter = "";
  $("filter-input").value = "";
  renderBuckets();
  renderBreadcrumb();
  await loadPage();
}

async function loadPage() {
  if (!state.bucket) return;
  state.loading = true;
  renderListing();
  try {
    const params = { bucket: state.bucket, prefix: state.prefix };
    if (state.nextToken) params.token = state.nextToken;
    const r = await api("/api/objects?" + qs(params));
    state.folders = state.folders.concat(r.folders);
    state.objects = state.objects.concat(r.objects);
    state.nextToken = r.is_truncated ? r.next_token : null;
  } catch (e) {
    toast("Failed to list objects: " + e.message, true);
  }
  state.loading = false;
  renderListing();
}

function renderBreadcrumb() {
  const bc = $("breadcrumb");
  if (!state.bucket) { bc.innerHTML = ""; return; }
  const parts = state.prefix.split("/").filter(Boolean);
  let html = `<button class="crumb${parts.length ? "" : " current"}" data-prefix="">🪣 ${esc(state.bucket)}</button>`;
  let acc = "";
  parts.forEach((p, i) => {
    acc += p + "/";
    const isLast = i === parts.length - 1;
    html += `<span class="sep">/</span><button class="crumb${isLast ? " current" : ""}" data-prefix="${esc(acc)}">${esc(p)}</button>`;
  });
  bc.innerHTML = html;
  bc.querySelectorAll(".crumb:not(.current)").forEach((el) =>
    el.addEventListener("click", () => openLocation(state.bucket, el.dataset.prefix)));
}

function sortedEntries() {
  const f = state.filter.toLowerCase();
  const folders = state.folders
    .map((p) => ({ type: "folder", prefix: p, name: p.slice(state.prefix.length).replace(/\/$/, "") }))
    .filter((e) => !f || e.name.toLowerCase().includes(f));
  const objects = state.objects.filter((o) => !f || o.name.toLowerCase().includes(f));
  const { col, dir } = state.sort;
  const cmp = (a, b, va, vb) => (va < vb ? -1 : va > vb ? 1 : 0) * dir;
  folders.sort((a, b) => cmp(a, b, a.name.toLowerCase(), b.name.toLowerCase()));
  objects.sort((a, b) => {
    if (col === "size") return cmp(a, b, a.size, b.size);
    if (col === "modified") return cmp(a, b, a.last_modified || "", b.last_modified || "");
    return cmp(a, b, a.name.toLowerCase(), b.name.toLowerCase());
  });
  return { folders, objects };
}

function renderListing() {
  const box = $("listing");
  if (!state.bucket) {
    box.innerHTML = '<div id="status-note">Select a bucket to browse its contents.</div>';
    return;
  }
  const { folders, objects } = sortedEntries();
  if (state.loading && !folders.length && !objects.length) {
    box.innerHTML = '<div id="status-note">Loading…</div>';
    return;
  }
  if (!folders.length && !objects.length) {
    box.innerHTML = '<div id="status-note">' + (state.filter ? "Nothing matches the filter." : "This location is empty.") + "</div>";
    return;
  }
  const arrow = (c) => state.sort.col === c ? `<span class="arrow">${state.sort.dir > 0 ? "▲" : "▼"}</span>` : "";
  const rows = [];
  for (const fo of folders) {
    rows.push(`<tr>
      <td class="name"><button class="row-link" data-open-prefix="${esc(fo.prefix)}"><span>📁</span><span class="label">${esc(fo.name)}/</span></button></td>
      <td class="size">—</td><td class="modified">—</td>
      <td class="actions"><button class="icon-btn danger" title="Delete folder" data-del-folder="${esc(fo.prefix)}">🗑</button></td>
    </tr>`);
  }
  for (const o of objects) {
    rows.push(`<tr>
      <td class="name"><button class="row-link" data-preview="${esc(o.key)}"><span>📄</span><span class="label">${esc(o.name)}</span></button></td>
      <td class="size">${fmtSize(o.size)}</td>
      <td class="modified">${fmtDate(o.last_modified)}</td>
      <td class="actions">
        <button class="icon-btn" title="Download" data-download="${esc(o.key)}">⬇</button>
        <button class="icon-btn danger" title="Delete" data-del-object="${esc(o.key)}">🗑</button>
      </td>
    </tr>`);
  }
  box.innerHTML = `
    <table>
      <thead><tr>
        <th data-sort="name">Name${arrow("name")}</th>
        <th data-sort="size" style="width:110px">Size${arrow("size")}</th>
        <th data-sort="modified" style="width:190px">Last modified${arrow("modified")}</th>
        <th class="no-sort" style="width:90px"></th>
      </tr></thead>
      <tbody>${rows.join("")}</tbody>
    </table>
    <div id="count-note">${folders.length} folder${folders.length === 1 ? "" : "s"}, ${objects.length} object${objects.length === 1 ? "" : "s"}${state.filter ? " (filtered)" : ""}</div>
    ${state.nextToken ? '<div id="load-more-row"><button class="btn" id="load-more">Load more…</button></div>' : ""}`;

  box.querySelectorAll("th[data-sort]").forEach((th) => th.addEventListener("click", () => {
    const c = th.dataset.sort;
    if (state.sort.col === c) state.sort.dir *= -1;
    else state.sort = { col: c, dir: 1 };
    renderListing();
  }));
  box.querySelectorAll("[data-open-prefix]").forEach((el) =>
    el.addEventListener("click", () => openLocation(state.bucket, el.dataset.openPrefix)));
  box.querySelectorAll("[data-preview]").forEach((el) =>
    el.addEventListener("click", () => openPreview(el.dataset.preview)));
  box.querySelectorAll("[data-download]").forEach((el) =>
    el.addEventListener("click", () => downloadObject(el.dataset.download)));
  box.querySelectorAll("[data-del-object]").forEach((el) =>
    el.addEventListener("click", () => askDelete({ type: "object", key: el.dataset.delObject })));
  box.querySelectorAll("[data-del-folder]").forEach((el) =>
    el.addEventListener("click", () => askDelete({ type: "folder", prefix: el.dataset.delFolder })));
  const more = $("load-more");
  if (more) more.addEventListener("click", loadPage);
}

// ---------- object actions ----------

function contentUrl(key) {
  return "/api/object/content?" + qs({ bucket: state.bucket, key });
}

function downloadObject(key) {
  const a = document.createElement("a");
  a.href = "/api/object/download?" + qs({ bucket: state.bucket, key });
  a.download = key.split("/").pop();
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function openPreview(key) {
  state.previewKey = key;
  $("preview-title").textContent = key;
  $("preview-title").title = key;
  $("preview-meta").innerHTML = '<span class="k">Loading…</span><span></span>';
  $("preview-box").innerHTML = "";
  $("preview-overlay").classList.add("open");

  let meta = null;
  try {
    meta = await api("/api/object/meta?" + qs({ bucket: state.bucket, key }));
  } catch (e) {
    $("preview-meta").innerHTML = `<span class="k">Error</span><span class="v">${esc(e.message)}</span>`;
    return;
  }
  $("preview-meta").innerHTML = `
    <span class="k">Size</span><span class="v">${fmtSize(meta.size)} (${meta.size} bytes)</span>
    <span class="k">Last modified</span><span class="v">${fmtDate(meta.last_modified)}</span>
    <span class="k">Content type</span><span class="v">${esc(meta.content_type || "—")}</span>
    <span class="k">ETag</span><span class="v">${esc(meta.etag || "—")}</span>
    <span class="k">Object URL</span><span class="v"><a href="${esc(meta.url)}" target="_blank" rel="noopener">${esc(meta.url)}</a></span>`;

  const e = ext(key);
  const baseLower = key.split("/").pop().toLowerCase();
  const looksText = TEXT_EXT.has(e)
    || (meta.content_type || "").startsWith("text/")
    || TEXT_BASENAMES.some((n) => baseLower === n || baseLower.startsWith(n + "."));
  const box = $("preview-box");
  if (IMG_EXT.has(e)) {
    box.innerHTML = `<img src="${esc(contentUrl(key))}" alt="${esc(key)}">`;
  } else if (looksText) {
    if (meta.size > PREVIEW_TEXT_LIMIT) {
      box.innerHTML = '<div class="no-preview">File is too large to preview inline — use Download.</div>';
    } else {
      box.innerHTML = '<div class="no-preview">Loading preview…</div>';
      try {
        const r = await fetch(contentUrl(key));
        if (!r.ok) throw new Error(r.statusText);
        const text = await r.text();
        if (state.previewKey === key) box.innerHTML = `<pre>${esc(text)}</pre>`;
      } catch (err) {
        if (state.previewKey === key) box.innerHTML = `<div class="no-preview">Preview failed: ${esc(err.message)}</div>`;
      }
    }
  } else {
    box.innerHTML = '<div class="no-preview">No inline preview for this file type — use Download.</div>';
  }
}

// ---------- delete ----------

function askDelete(target) {
  state.pendingDelete = target;
  const t = $("confirm-text");
  if (target.type === "folder") {
    t.innerHTML = `Delete the folder <b>${esc(target.prefix)}</b> and <b>all objects under it</b> from bucket <b>${esc(state.bucket)}</b>? This cannot be undone.`;
  } else {
    t.innerHTML = `Delete object <b>${esc(target.key)}</b> from bucket <b>${esc(state.bucket)}</b>? This cannot be undone.`;
  }
  $("confirm-overlay").classList.add("open");
}

async function runDelete() {
  const target = state.pendingDelete;
  if (!target) return;
  const btn = $("confirm-delete-btn");
  btn.disabled = true;
  try {
    if (target.type === "folder") {
      const r = await api("/api/folder?" + qs({ bucket: state.bucket, prefix: target.prefix }), { method: "DELETE" });
      toast(`Deleted ${r.deleted_count} object(s) under ${target.prefix}`);
    } else {
      await api("/api/object?" + qs({ bucket: state.bucket, key: target.key }), { method: "DELETE" });
      toast(`Deleted ${target.key}`);
    }
    $("confirm-overlay").classList.remove("open");
    $("preview-overlay").classList.remove("open");
    await openLocation(state.bucket, state.prefix);
  } catch (e) {
    toast("Delete failed: " + e.message, true);
  }
  btn.disabled = false;
  state.pendingDelete = null;
}

// ---------- upload ----------

async function uploadFiles(files) {
  if (!state.bucket) { toast("Select a bucket first.", true); return; }
  if (!files.length) return;
  const btn = $("upload-btn");
  btn.disabled = true;
  btn.textContent = `Uploading ${files.length}…`;
  const form = new FormData();
  form.append("bucket", state.bucket);
  form.append("prefix", state.prefix);
  for (const f of files) form.append("files", f);
  try {
    const r = await api("/api/upload", { method: "POST", body: form });
    toast(`Uploaded ${r.uploaded.length} file(s)`);
    await openLocation(state.bucket, state.prefix);
  } catch (e) {
    toast("Upload failed: " + e.message, true);
  }
  btn.disabled = false;
  btn.textContent = "⬆ Upload";
}

// ---------- wiring ----------

$("refresh-buckets").addEventListener("click", () => { loadStatus(); loadBuckets(); });
$("refresh-listing").addEventListener("click", () => {
  if (state.bucket) openLocation(state.bucket, state.prefix);
});
$("filter-input").addEventListener("input", (e) => {
  state.filter = e.target.value.trim();
  renderListing();
});
$("upload-btn").addEventListener("click", () => $("file-input").click());
$("file-input").addEventListener("change", (e) => {
  uploadFiles(Array.from(e.target.files));
  e.target.value = "";
});
$("confirm-delete-btn").addEventListener("click", runDelete);
$("preview-download").addEventListener("click", () => {
  if (state.previewKey) downloadObject(state.previewKey);
});
$("preview-delete").addEventListener("click", () => {
  if (state.previewKey) askDelete({ type: "object", key: state.previewKey });
});
document.querySelectorAll("[data-close]").forEach((el) =>
  el.addEventListener("click", () => $(el.dataset.close).classList.remove("open")));
document.querySelectorAll(".overlay").forEach((ov) =>
  ov.addEventListener("click", (e) => { if (e.target === ov) ov.classList.remove("open"); }));
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape")
    document.querySelectorAll(".overlay.open").forEach((ov) => ov.classList.remove("open"));
});

(async function init() {
  renderListing();
  await loadStatus();
  await loadBuckets();
  if (state.buckets.length === 1) openLocation(state.buckets[0].name, "");
})();
</script>
</body>
</html>
