# Cisco Catalyst 2960 - Core Switch
name: "Cisco Catalyst 2960-X - Core Switch"
device_type: "network_switch"
location: "Data Center - Core"
ip_address: "192.168.1.10"
tags: ["switch", "cisco", "core", "critical"]

network:
  device_ip: "192.168.1.10"
  base_url: "https://192.168.1.10"
  ssh_port: 22
  telnet_port: 23
  web_port: 443

authentication:
  username: "admin"
  password: "cisco123"
  type: "form_auth"
  enable_password: "enable123"

# Cisco-specific settings
vendor_specific:
  vendor: "cisco"
  model: "2960-X"
  ios_version: "15.2"
  stack_member: false

ports:
  count: 48
  types: ["gigabit_ethernet", "sfp"]
  uplink_ports: [47, 48]
  server_ports: [1, 2, 3, 4, 5, 6, 7, 8]
  user_ports: [9, 10, 11, 12, 13, 14, 15, 16]
  test_ports: [45, 46]  # Safe to test on

vlans:
  default_vlan: 1
  management_vlan: 100
  server_vlan: 10
  user_vlan: 20
  guest_vlan: 30
  test_vlans: [500, 501, 502]

snmp:
  community: "network123"
  version: "2c"
  oids:
    port_status: "1.3.6.1.2.1.2.2.1.8"    # ifOperStatus
    port_admin: "1.3.6.1.2.1.2.2.1.7"     # ifAdminStatus  
    vlan_ports: "1.3.6.1.2.1.17.7.1.4.3.1.2" # dot1qVlanStaticEgressPorts

# Cisco CLI command mappings
cli_commands:
  show_version: "show version"
  show_interfaces: "show interfaces status"
  show_vlans: "show vlan brief"
  show_spanning_tree: "show spanning-tree"
  show_mac_table: "show mac address-table"
  show_running_config: "show running-config"

api:
  # If using RESTCONF (newer Cisco switches)
  endpoints:
    interfaces: "/restconf/data/ietf-interfaces:interfaces"
    vlans: "/restconf/data/ieee802-dot1q-bridge:bridges"
    system: "/restconf/data/ietf-system:system"

test_data:
  safe_test_ports: [45, 46]
  test_vlan_range: [500, 510]
  expected_model: "2960"
  minimum_ports: 24

# Environment-specific configurations
environments:
  development:
    test_ports: [1, 2, 3, 4, 45, 46, 47, 48]
    test_vlans: [500, 501, 502, 503, 504]
    backup_config: false
  production:
    test_ports: [45, 46]  # Limited safe ports
    test_vlans: [500]
    readonly_mode: true
    backup_config: true
    change_window_required: true