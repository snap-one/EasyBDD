# APC PDU Group - Shared Configuration
group_name: "apc_pdus"
group_type: "power_supply"
description: "Shared configuration for all APC Rack PDUs"

# Common authentication
authentication:
  username: "apc"
  password: "apc"
  type: "basic_auth"

# Shared network settings
network:
  web_port: 443
  snmp_port: 161
  protocol: "https"

# Common API endpoints
api:
  endpoints:
    outlets: "/rest/mbfunccode/mb_func_code_1"
    status: "/rest/mbfunccode/mb_func_code_3"
    power_info: "/rest/mbfunccode/mb_func_code_4"
    control: "/rest/mbfunccode/mb_func_code_5"

# Shared outlet configuration
outlets:
  numbering: "1-based"
  control_delay: 3

# Common monitoring thresholds
monitoring:
  voltage_range: [208, 240]
  current_threshold: 20
  power_threshold: 4000
  temperature_threshold: 35

# Shared SNMP configuration
snmp:
  community: "private"
  version: "2c"
  oids:
    outlet_status: "1.3.6.1.4.1.318.1.1.12.3.5.1.1.4"
    outlet_name: "1.3.6.1.4.1.318.1.1.12.3.5.1.1.2"
    total_power: "1.3.6.1.4.1.318.1.1.12.1.16.0"

# Vendor-specific settings
vendor_specific:
  vendor: "apc"
  firmware_min_version: "6.7.4"
  supports_metering: true
  supports_switching: true

# Device inventory with rack-specific details
device_inventory:
  rack_a1_pdu:
    ip_address: "192.168.1.201"
    mac_address: "00:c0:b7:12:34:56"
    serial_number: "2A1234E01234"
    model: "AP8641"
    location: "Data Center - Rack A1"
    outlet_count: 16
    critical_outlets: [1, 2, 3, 4]  # Core switch, firewall, etc.
    test_outlets: [13, 14, 15, 16]  # Safe to cycle
    tags: ["critical", "datacenter"]
    
  rack_a2_pdu:
    ip_address: "192.168.1.202"
    mac_address: "00:c0:b7:12:34:57"
    serial_number: "2A1234E01235"
    model: "AP8641"
    location: "Data Center - Rack A2"
    outlet_count: 16
    critical_outlets: [1, 2, 3, 4, 5, 6]
    test_outlets: [15, 16]
    tags: ["critical", "datacenter"]
    
  lab_pdu:
    ip_address: "192.168.1.203"
    mac_address: "00:c0:b7:12:34:58"
    serial_number: "2A1234E01236"
    model: "AP8632"
    location: "Test Lab"
