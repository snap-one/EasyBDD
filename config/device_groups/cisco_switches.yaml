# Cisco Switch Group - Shared Configuration
group_name: "cisco_switches"
group_type: "network_switch"
description: "Shared configuration for all Cisco Catalyst switches"

# Common authentication
authentication:
  username: "admin"
  password: "cisco123"
  enable_password: "enable123"
  type: "ssh"

# Shared network settings
network:
  ssh_port: 22
  telnet_port: 23
  web_port: 443
  protocol: "https"
  snmp_port: 161

# Common vendor settings
vendor_specific:
  vendor: "cisco"
  ios_family: "catalyst"
  management_protocol: "ssh"

# Shared SNMP configuration
snmp:
  community: "network123"
  version: "2c"
  oids:
    port_status: "1.3.6.1.2.1.2.2.1.8"
    port_admin: "1.3.6.1.2.1.2.2.1.7"
    vlan_ports: "1.3.6.1.2.1.17.7.1.4.3.1.2"

# Common CLI commands
cli_commands:
  show_version: "show version"
  show_interfaces: "show interfaces status"
  show_vlans: "show vlan brief"
  show_spanning_tree: "show spanning-tree"

# Common VLAN configuration
vlans:
  default_vlan: 1
  management_vlan: 100
  
